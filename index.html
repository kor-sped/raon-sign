<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>라온반 수어교실</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e8f4fd; font-family: 'Segoe UI', sans-serif; color: #1e3a5f; max-width: 480px; margin: 0 auto; min-height: 100vh; }
  #header { background: #3b82f6; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  #header span { font-size: 16px; font-weight: 700; }
  #theme-btn { background: rgba(255,255,255,0.25); border: none; border-radius: 8px; padding: 6px 12px; color: #fff; font-weight: 600; cursor: pointer; font-size: 13px; }
  #nav { background: #fff; border-bottom: 2px solid #3b82f6; position: sticky; top: 48px; z-index: 99; display: flex; overflow-x: auto; white-space: nowrap; }
  #nav button { flex-shrink: 0; padding: 10px 12px; border: none; background: #fff; color: #1e3a5f; font-size: 12px; cursor: pointer; }
  #nav button.active { background: #3b82f6; color: #fff; font-weight: 700; }
  #body { padding: 16px; }
  .card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  #hero { border-radius: 14px; overflow: hidden; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  #hero-inner { background: #3b82f6; color: #fff; display: flex; align-items: stretch; }
  .hero-side { width: 72px; flex-shrink: 0; background: rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px 4px; font-size: 11px; color: rgba(255,255,255,0.9); text-align: center; }
  #hero-center { flex: 1; text-align: center; padding: 20px 8px; }
  #hero-center h1 { font-size: 18px; font-weight: 700; margin-top: 6px; }
  #hero-center p { font-size: 12px; opacity: 0.85; margin-top: 4px; }
  #today-word { font-size: 28px; font-weight: 800; color: #3b82f6; text-align: center; padding: 12px 0; }
  .menu-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #3b82f620; }
  .lesson-card { display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .lesson-emoji-box { width: 80px; height: 56px; border-radius: 8px; background: #3b82f622; display: flex; align-items: center; justify-content: center; font-size: 30px; flex-shrink: 0; }
  .detail-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .back-btn { background: transparent; color: #3b82f6; border: 1.5px solid #3b82f6; border-radius: 8px; padding: 6px 14px; font-weight: 600; cursor: pointer; font-size: 13px; }
  .big-emoji-box { width: 100%; height: 160px; border-radius: 12px; background: #3b82f622; display: flex; align-items: center; justify-content: center; font-size: 72px; margin-bottom: 12px; }
  .yt-btn { display: block; background: #FF0000; color: #fff; border-radius: 10px; padding: 12px; text-align: center; font-weight: 700; font-size: 15px; text-decoration: none; }
  .no-video-box { background: #e8f4fd; border-radius: 10px; padding: 20px; text-align: center; font-size: 14px; opacity: 0.7; }
  .dict-open { display: block; border-radius: 12px; padding: 14px; text-align: center; font-weight: 700; font-size: 16px; text-decoration: none; color: #fff; margin-top: 16px; }
  .dict-step { font-size: 14px; line-height: 1.8; }
  #theme-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: #0008; z-index: 200; align-items: flex-end; justify-content: center; }
  #theme-overlay.open { display: flex; }
  #theme-sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-width: 480px; }
  #theme-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 10px; }
  .theme-btn { border-radius: 14px; padding: 18px 8px; font-weight: 700; font-size: 15px; cursor: pointer; color: #fff; border: 3px solid transparent; }
</style>
</head>
<body>

<div id="header">
  <span>🤟 라온반 수어교실</span>
  <button id="theme-btn" onclick="openTheme()">🎨 테마</button>
</div>

<div id="nav">
  <button class="active" onclick="goPage('home')">🏠 홈</button>
  <button onclick="goPage('beginner')">📗 초급 수어</button>
  <button onclick="goPage('vocab')">📘 수어 어휘</button>
  <button onclick="goPage('advanced')">📙 중급 어휘</button>
  <button onclick="goPage('dict')">📖 한국수어누리사전</button>
</div>

<div id="body"></div>

<div id="theme-overlay" onclick="closeTheme()">
  <div id="theme-sheet" onclick="event.stopPropagation()">
    <div style="font-weight:700;font-size:16px;margin-bottom:12px">🎨 테마 선택</div>
    <div id="theme-grid"></div>
  </div>
</div>

<script>
const THEMES = [
  { name:"하늘 💙", bg:"#e8f4fd", primary:"#3b82f6", accent:"#1d4ed8", card:"#fff", text:"#1e3a5f" },
  { name:"딸기 🍓", bg:"#fde8f0", primary:"#ec4899", accent:"#be185d", card:"#fff", text:"#5f1e3a" },
  { name:"숲 🌿",  bg:"#e8fdf0", primary:"#22c55e", accent:"#15803d", card:"#fff", text:"#1e5f3a" },
  { name:"보라 💜", bg:"#f0e8fd", primary:"#a855f7", accent:"#7e22ce", card:"#fff", text:"#3a1e5f" },
  { name:"해 🌞",  bg:"#fdf8e8", primary:"#f59e0b", accent:"#b45309", card:"#fff", text:"#5f4a1e" },
  { name:"밤 🌙",  bg:"#1e1e2e", primary:"#818cf8", accent:"#6366f1", card:"#2d2d3f", text:"#e2e8f0" },
];

const BEGINNER = [
  { id:1,  title:"1강. 한국수어 조망하기", desc:"책 속 사진 참고 (동영상 링크 없음)", url:"", emoji:"🤟" },
  { id:2,  title:"2강. 인사", desc:"22쪽", url:"https://youtu.be/qUl7zGUuj1o?si=VinhZsOv8MnRZsvz", emoji:"👋" },
  { id:3,  title:"3강. 소개", desc:"", url:"https://youtu.be/99c0BCzDB4c?si=9g3f4mjeRr0pZ6TA", emoji:"🙋" },
  { id:4,  title:"4강. 물건", desc:"", url:"https://youtu.be/Hx_y6ZkxP-w?si=q96aFWYiX6sHRC8N", emoji:"🎒" },
  { id:5,  title:"5강. 하루 일과", desc:"", url:"https://youtu.be/ucypOmvNxqg?si=nw5PGnXeFeVOrXwt", emoji:"📅" },
  { id:6,  title:"6강. 날씨", desc:"", url:"https://youtu.be/Sj54s42QkGI?si=0UJcAj1nhB_z2scT", emoji:"🌦️" },
  { id:7,  title:"7강. 음식", desc:"", url:"https://youtu.be/C8T1VongutU?si=Z7Mw9bdckWAVLR5U", emoji:"🍚" },
  { id:8,  title:"8강. 시간", desc:"", url:"https://youtu.be/sVIHsU7C40Y?si=JS6-DhF1mbao13eG", emoji:"⏰" },
  { id:9,  title:"9강. 위치와 장소", desc:"", url:"https://youtu.be/XmRVGPu32j4?si=tz0puMXc5e3LkPZG", emoji:"📍" },
  { id:10, title:"10강. 경험", desc:"", url:"https://youtu.be/t6mi9haerww?si=5k6rfWsFeWxRu4zc", emoji:"💭" },
  { id:11, title:"11강. 공간과 활동", desc:"", url:"https://youtu.be/EQ7px1siGMY?si=fwBFFUemk-CjP8uF", emoji:"🏃" },
  { id:12, title:"12강. 관용 표현", desc:"", url:"https://youtu.be/sAOTz2DANek?si=ywdJG0m_78WrEL5W", emoji:"💬" },
];

const VOCAB = [
  { id:1,  title:"1과. 만남", url:"https://youtu.be/4lNluYfqdMQ?si=DdgIKCCZckzJ8EJn", emoji:"🤝" },
  { id:2,  title:"2과. 소개", url:"https://youtu.be/m6HwuNueBIA?si=TkAs3zJVnl58hdDU", emoji:"🙋" },
  { id:3,  title:"3과. 시간", url:"https://youtu.be/PVGC8GgcMmQ?si=HD2mIwhzStgC4L9t", emoji:"⏰" },
  { id:4,  title:"4과. 날씨", url:"https://youtu.be/mx4u2u8odYc?si=qeTDCUP_0nWykOtV", emoji:"🌦️" },
  { id:5,  title:"5과. 물건", url:"https://youtu.be/BHxa_44b1So?si=aw8LcYDBpkrldn_o", emoji:"🎒" },
  { id:6,  title:"6과. 색깔", url:"https://youtu.be/2ZAyMJLKzCA?si=4v9TX4jZI3QZLGDG", emoji:"🎨" },
  { id:7,  title:"7과. 음식", url:"https://youtu.be/d5eaiLRF2oY?si=WtOSzABjAGr1pUWi", emoji:"🍚" },
  { id:8,  title:"8과. 건강", url:"https://youtu.be/ROwBQgFjWRI?si=a8BLILuJK1hVazXi", emoji:"💊" },
  { id:9,  title:"9과. 교통", url:"https://youtu.be/7wKbvCIDWY8?si=m5eqBMsYVqHn-fIR", emoji:"🚌" },
  { id:10, title:"10과. 사회", url:"https://youtu.be/c6obXsWtC00?si=L8P951TQzsOgmIRl", emoji:"🏙️" },
  { id:11, title:"11과. 문화", url:"https://youtu.be/LyPz0D3FBEk?si=ZHv7Ma0ThGKiEIew", emoji:"🎭" },
  { id:12, title:"12과. 교육", url:"https://youtu.be/GpMcIXPeGH4?si=ILgpTs77xnpC5iPK", emoji:"📚" },
  { id:13, title:"13과. 정치", url:"https://youtu.be/cCHZJ0ZQVjE?si=pVw_Yot-HJiX0su1", emoji:"🏛️" },
  { id:14, title:"14과. 경제", url:"https://youtu.be/T3TAR5ftNl4?si=7VUFhfg15FOrC9B3", emoji:"💰" },
  { id:15, title:"15과. 생활", url:"https://youtu.be/gFO1_fbu2fA?si=0J7IPnMFKFphv7Ng", emoji:"🏠" },
];

let themeIdx = 0;
let currentPage = 'home';

function applyTheme() {
  const t = THEMES[themeIdx];
  document.body.style.background = t.bg;
  document.body.style.color = t.text;
  document.getElementById('header').style.background = t.primary;
  const nav = document.getElementById('nav');
  nav.style.borderBottomColor = t.primary;
  nav.style.background = t.card;
  document.querySelectorAll('#nav button').forEach(b => {
    b.style.background = b.classList.contains('active') ? t.primary : t.card;
    b.style.color = b.classList.contains('active') ? '#fff' : t.text;
  });
  document.getElementById('theme-sheet').style.background = t.card;
  document.getElementById('theme-sheet').style.color = t.text;
  buildThemeGrid();
}

function buildThemeGrid() {
  const grid = document.getElementById('theme-grid');
  grid.innerHTML = '';
  THEMES.forEach((th, i) => {
    const btn = document.createElement('button');
    btn.className = 'theme-btn';
    btn.style.background = th.primary;
    if (i === themeIdx) btn.style.boxShadow = '0 0 0 3px ' + th.accent;
    btn.textContent = th.name;
    btn.onclick = () => { themeIdx = i; closeTheme(); applyTheme(); render(); };
    grid.appendChild(btn);
  });
}

function openTheme() { document.getElementById('theme-overlay').classList.add('open'); }
function closeTheme() { document.getElementById('theme-overlay').classList.remove('open'); }

function getYTId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([^&?/]+)/);
  return m ? m[1] : null;
}

function todayWord() {
  const words = ["안녕하세요","감사합니다","사랑해요","친구","학교","밥 먹었어요?"];
  return words[new Date().getDate() % words.length];
}

function card(content) {
  return '<div class="card">' + content + '</div>';
}

function renderHome() {
  const t = THEMES[themeIdx];
  return `
    <div id="hero">
      <div id="hero-inner" style="background:${t.primary}">
        <div class="hero-side">
          <span style="font-size:22px">🌈</span>
          <span style="font-weight:700;line-height:1.3">수어반<br/>모집중</span>
          <span style="font-size:10px;opacity:0.8">매주 화·목<br/>점심시간</span>
          <span style="font-size:18px;margin-top:4px">🐻</span>
        </div>
        <div id="hero-center">
          <div style="font-size:34px">🤟</div>
          <h1>라온반 수어교실</h1>
          <p>함께 배우는 한국 수어!</p>
        </div>
        <div class="hero-side">
          <span style="font-size:18px">🍀</span>
          <span style="font-weight:700;line-height:1.3">라온반<br/>수어반</span>
          <span style="font-size:10px;opacity:0.8">손으로 하는<br/>나의 이야기</span>
          <span style="font-size:18px;margin-top:4px">✨</span>
        </div>
      </div>
    </div>
    ${card(`
      <div style="font-weight:700;font-size:15px;margin-bottom:8px">✨ 오늘의 수어 단어</div>
      <div id="today-word" style="color:${t.primary}">"${todayWord()}"</div>
      <div style="font-size:13px;opacity:0.7;text-align:center">한국수어누리사전에서 영상을 찾아봐요!</div>
    `)}
    ${card(`
      <div style="font-weight:700;font-size:15px;margin-bottom:8px">🗺️ 메뉴 안내</div>
      ${[["📗","초급 수어","1~12강 강의 영상"],["📘","수어 어휘","1~15과 어휘 영상"],["📙","중급 어휘","준비 중"],["📖","한국수어누리사전","단어 검색"]].map(([ic,nm,ds])=>`
        <div class="menu-item">
          <span style="font-size:20px">${ic}</span>
          <div><div style="font-weight:600;font-size:14px">${nm}</div><div style="font-size:12px;opacity:0.7">${ds}</div></div>
        </div>`).join('')}
    `)}
  `;
}

function renderLessonList(lessons, title, icon) {
  const t = THEMES[themeIdx];
  return `
    <div style="font-weight:700;font-size:16px;margin-bottom:14px">${icon} ${title}</div>
    ${lessons.map(l => card(`
      <div class="lesson-card" onclick='showDetail(${JSON.stringify(l)})'>
        <div class="lesson-emoji-box" style="background:${t.primary}22">${l.emoji||'🤟'}</div>
        <div>
          <div style="font-weight:600;font-size:14px">${l.title}</div>
          ${l.desc ? `<div style="font-size:12px;opacity:0.6;margin-top:2px">${l.desc}</div>` : ''}
          ${!l.url ? `<div style="font-size:12px;color:${t.accent};margin-top:2px">영상 없음</div>` : ''}
        </div>
      </div>
    `)).join('')}
  `;
}

function showDetail(l) {
  const t = THEMES[themeIdx];
  const ytId = getYTId(l.url);
  document.getElementById('body').innerHTML = `
    <div class="detail-top">
      <button class="back-btn" style="color:${t.primary};border-color:${t.primary}" onclick="render()">← 목록으로</button>
    </div>
    ${card(`
      <div style="font-weight:700;font-size:17px;margin-bottom:8px">${l.title}</div>
      ${l.desc ? `<div style="font-size:13px;opacity:0.7;margin-bottom:10px">${l.desc}</div>` : ''}
      ${ytId
        ? `<div class="big-emoji-box" style="background:${t.primary}22">${l.emoji||'🤟'}</div>
           <a class="yt-btn" href="${l.url}" target="_blank" rel="noopener noreferrer">▶ 유튜브에서 보기</a>`
        : `<div class="no-video-box" style="background:${t.bg}">📖 영상 없음 — 교재를 참고해 주세요!</div>`
      }
    `)}
  `;
}

function renderDict() {
  const t = THEMES[themeIdx];
  return `
    <div style="font-weight:700;font-size:16px;margin-bottom:14px">📖 한국수어누리사전</div>
    ${card(`
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:56px;margin-bottom:16px">🔍</div>
        <div style="font-weight:700;font-size:17px;margin-bottom:8px">국립국어원 한국수어누리사전</div>
        <div style="font-size:14px;opacity:0.7;margin-bottom:8px;line-height:1.6">수어 단어를 검색하고<br/>영상으로 확인할 수 있어요!</div>
        <a class="dict-open" href="https://sldict.korean.go.kr/front/main/main.do#" target="_blank" rel="noopener noreferrer" style="background:${t.primary}">🌐 한국수어누리사전 열기</a>
      </div>
    `)}
    ${card(`
      <div style="font-weight:700;margin-bottom:6px">💡 이렇게 사용해요</div>
      <div class="dict-step">1. 위 버튼을 눌러 사전을 열어요<br/>2. 검색창에 찾고 싶은 단어를 입력해요<br/>3. 수어 영상으로 확인해요!</div>
    `)}
  `;
}

function renderAdvanced() {
  return card(`
    <div style="text-align:center;padding:40px 16px">
      <div style="font-size:40px;margin-bottom:12px">🚧</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:8px">준비 중이에요!</div>
      <div style="font-size:14px;opacity:0.7">중급 어휘 자료는 곧 업데이트될 예정이에요.</div>
    </div>
  `);
}

function goPage(page) {
  currentPage = page;
  document.querySelectorAll('#nav button').forEach((b, i) => {
    const pages = ['home','beginner','vocab','advanced','dict'];
    b.classList.toggle('active', pages[i] === page);
  });
  applyTheme();
  render();
}

function render() {
  const body = document.getElementById('body');
  if (currentPage === 'home')          body.innerHTML = renderHome();
  else if (currentPage === 'beginner') body.innerHTML = renderLessonList(BEGINNER, '초급 수어', '📗');
  else if (currentPage === 'vocab')    body.innerHTML = renderLessonList(VOCAB, '수어 어휘', '📘');
  else if (currentPage === 'advanced') body.innerHTML = renderAdvanced();
  else if (currentPage === 'dict')     body.innerHTML = renderDict();
}

applyTheme();
render();
</script>
</body>
</html>
