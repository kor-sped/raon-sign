let themeIdx = 0;
let currentPage = 'home';

function t() { return THEMES[themeIdx]; }
function todayWord() { return WORD_DATA[new Date().getDate() % WORD_DATA.length].word; }
function todaySentences() { return WORD_DATA[new Date().getDate() % WORD_DATA.length].sentences; }

function linkify(text) {
  if (!text) return '';
  return text.replace(/(https?:\/\/[^\s<]+)/g, function(url) {
    return '<a href="' + url + '" target="_blank" rel="noopener noreferrer" style="color:#3b82f6;word-break:break-all">' + url + '</a>';
  });
}

function applyTheme() {
  const th = t();
  document.body.style.background = th.bg;
  document.body.style.color = th.text;
  document.getElementById('header').style.background = th.primary;
  const nav = document.getElementById('nav');
  nav.style.borderBottomColor = th.primary;
  nav.style.background = th.card;
  document.querySelectorAll('#nav button').forEach((b,i) => {
    const pages = ['beginner','vocab','advanced','board'];
    b.style.background = pages[i]===currentPage ? th.primary : th.card;
    b.style.color = pages[i]===currentPage ? '#fff' : th.text;
  });
  document.getElementById('theme-sheet').style.background = t().card;
  document.getElementById('theme-sheet').style.color = t().text;
  buildThemeGrid();
}

function buildThemeGrid() {
  const grid = document.getElementById('theme-grid');
  grid.innerHTML = '';
  THEMES.forEach((th,i) => {
    const btn = document.createElement('button');
    btn.className = 'theme-btn';
    btn.style.background = th.primary;
    if (i===themeIdx) btn.style.boxShadow = '0 0 0 3px '+th.accent;
    btn.textContent = th.name;
    btn.onclick = () => { themeIdx=i; closeTheme(); applyTheme(); render(); };
    grid.appendChild(btn);
  });
}

function openTheme() { document.getElementById('theme-overlay').classList.add('open'); }
function closeTheme() { document.getElementById('theme-overlay').classList.remove('open'); }

function getYTId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([^&?/]+)/);
  return m ? m[1] : null;
}

function inp(id, placeholder, type) {
  type = type || 'text';
  var th = t();
  return '<input id="'+id+'" type="'+type+'" class="inp" placeholder="'+placeholder+'" style="border:1.5px solid '+th.primary+';background:'+th.bg+';color:'+th.text+'" />';
}
function ta(id, placeholder) {
  var th = t();
  return '<textarea id="'+id+'" class="ta" placeholder="'+placeholder+'" style="border:1.5px solid '+th.primary+';background:'+th.bg+';color:'+th.text+'"></textarea>';
}

async function renderBoard(viewPostId) {
  var th = t();
  var body = document.getElementById('body');
  viewPostId = viewPostId || null;

  if (viewPostId) {
    body.innerHTML = '<div style="text-align:center;padding:40px">⏳ 불러오는 중...</div>';
    var post = window._posts && window._posts.find(function(p) { return String(p.id)===String(viewPostId); });
    var comments = [];
    try {
      var res = await fetch(API+'?action=getComments&post_id='+viewPostId);
      comments = await res.json();
    } catch(e) {}

    var html = '<div class="detail-top">';
    html += '<button class="back-btn" style="color:'+th.primary+';border-color:'+th.primary+'" onclick="renderBoard()">← 목록으로</button>';
    html += '<div style="display:flex;gap:8px">';
    html += '<button onclick="showEditForm()" style="background:'+th.primary+';color:#fff;border:none;border-radius:8px;padding:7px 14px;font-weight:600;cursor:pointer;font-size:13px">✏️ 수정</button>';
    html += '<button onclick="deletePostConfirm(\''+viewPostId+'\')" style="background:#ef4444;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-weight:600;cursor:pointer;font-size:13px">🗑️ 삭제</button>';
    html += '</div></div>';

    html += '<div id="edit-form" style="display:none;max-width:800px;margin:0 auto 16px"><div class="card">';
    html += '<div style="font-weight:700;margin-bottom:10px">✏️ 글 수정</div>';
    html += inp('e-pw','비밀번호 (선생님 또는 본인 비밀번호)','password');
    html += '<input id="e-title" class="inp" value="'+(post?post.title.replace(/"/g,'&quot;'):'')+'" style="border:1.5px solid '+th.primary+';background:'+th.bg+';color:'+th.text+'" />';
    html += '<textarea id="e-content" class="ta" style="border:1.5px solid '+th.primary+';background:'+th.bg+';color:'+th.text+'">'+(post?post.content:'')+'</textarea>';
    html += '<button class="submit-btn" style="background:'+th.primary+'" onclick="submitEdit(\''+viewPostId+'\')">수정 완료</button>';
    html += '</div></div>';

    html += '<div class="card" style="max-width:800px;margin:0 auto 16px">';
    html += '<div style="font-weight:700;font-size:20px;margin-bottom:6px">'+(post?post.title:'')+'</div>';
    html += '<div style="font-size:12px;opacity:0.6;margin-bottom:14px">'+(post&&post.isGuest?'👤 '+post.author:'선생님')+' · '+(post?post.date:'')+'</div>';
    html += '<div style="font-size:15px;line-height:1.8;white-space:pre-wrap">'+(post?linkify(post.content):'')+'</div>';
    html += '</div>';

    html += '<div style="max-width:800px;margin:0 auto">';
    html += '<div style="font-weight:700;font-size:16px;margin-bottom:12px">💬 댓글 '+comments.length+'개</div>';
    comments.forEach(function(c) {
      html += '<div class="card" style="padding:14px">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center">';
      html += '<div style="font-weight:600;font-size:13px">'+c.author+' <span style="font-weight:400;opacity:0.6">· '+c.date+'</span></div>';
      html += '<div style="display:flex;gap:6px">';
      html += '<button onclick="showCommentEditForm(\''+c.id+'\')" style="background:none;border:none;cursor:pointer;font-size:13px;opacity:0.5">✏️</button>';
      html += '<button onclick="deleteCommentConfirm(\''+c.id+'\',\''+viewPostId+'\')" style="background:none;border:none;cursor:pointer;font-size:13px;opacity:0.5">🗑️</button>';
      html += '</div></div>';
      html += '<div id="comment-view-'+c.id+'" style="font-size:14px;margin-top:5px;white-space:pre-wrap">'+linkify(c.content)+'</div>';
      html += '<div id="comment-edit-'+c.id+'" style="display:none;margin-top:8px">';
      html += inp('ce-pw-'+c.id,'비밀번호 (선생님 또는 본인 비밀번호)','password');
      html += '<textarea id="ce-content-'+c.id+'" class="ta" style="border:1.5px solid '+th.primary+';background:'+th.bg+';color:'+th.text+';min-height:60px">'+c.content+'</textarea>';
      html += '<button class="submit-btn" style="background:'+th.primary+';font-size:13px;padding:8px 14px" onclick="submitCommentEdit(\''+c.id+'\',\''+viewPostId+'\')">수정 완료</button>';
      html += '</div></div>';
    });

    html += '<div class="card">';
    html += '<div style="font-weight:700;margin-bottom:10px">댓글 달기</div>';
    html += inp('c-author','닉네임');
    html += inp('c-pw','비밀번호 설정 (수정/삭제에 사용)','password');
    html += ta('c-content','댓글을 써봐요 😊');
    html += '<button class="submit-btn" style="background:'+th.primary+'" onclick="submitComment(\''+viewPostId+'\')">댓글 올리기</button>';
    html += '</div></div>';

    body.innerHTML = html;
    return;
  }

  body.innerHTML = '<div style="text-align:center;padding:40px">⏳ 불러오는 중...</div>';
  var posts = [];
  try {
    var r = await fetch(API+'?action=getPosts');
    posts = await r.json();
    window._posts = posts;
  } catch(e) {
    body.innerHTML = '<div class="card" style="text-align:center;padding:30px;opacity:0.7">😥 게시판을 불러오지 못했어요.<br/>잠시 후 다시 시도해 주세요.</div>';
    return;
  }

  var html2 = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">';
  html2 += '<span style="font-weight:700;font-size:18px">📋 게시판</span>';
  html2 += '<div style="display:flex;gap:8px">';
  html2 += '<button onclick="showPostForm(\'teacher\')" style="background:'+th.primary+';color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px">✏️ 선생님</button>';
  html2 += '<button onclick="showPostForm(\'guest\')" style="background:#64748b;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px">✏️ 방문객</button>';
  html2 += '</div></div>';

  html2 += '<div id="post-form" style="display:none;max-width:600px;margin-bottom:16px">';
  html2 += '<div class="card" id="teacher-form" style="display:none">';
  html2 += '<div style="font-weight:700;margin-bottom:12px">🔒 선생님 글쓰기</div>';
  html2 += inp('p-pw','선생님 비밀번호','password');
  html2 += inp('p-title','제목');
  html2 += ta('p-content','내용을 입력해요');
  html2 += '<button class="submit-btn" style="background:'+th.primary+'" onclick="submitPost(\'teacher\')">올리기 📋</button></div>';

  html2 += '<div class="card" id="guest-form" style="display:none">';
  html2 += '<div style="font-weight:700;margin-bottom:12px">👤 방문객 글쓰기</div>';
  html2 += inp('g-author','닉네임');
  html2 += inp('g-pw','비밀번호 설정 (수정/삭제에 사용)','password');
  html2 += inp('g-title','제목');
  html2 += ta('g-content','내용을 입력해요');
  html2 += '<button class="submit-btn" style="background:#64748b" onclick="submitPost(\'guest\')">올리기 📋</button></div></div>';

  if (posts.length === 0) {
    html2 += '<div class="card" style="text-align:center;padding:40px;opacity:0.7">아직 게시글이 없어요.<br/>첫 글을 써봐요! 😊</div>';
  } else {
    html2 += '<div class="board-grid">';
    posts.forEach(function(p) {
      html2 += '<div class="board-item" onclick="renderBoard(\''+p.id+'\')">';
      html2 += '<div style="font-weight:700;font-size:15px;margin-bottom:6px">'+p.title+'</div>';
      html2 += '<div style="font-size:13px;opacity:0.7">'+p.content.slice(0,80)+(p.content.length>80?'..':'')+'</div>';
      html2 += '<div style="font-size:12px;opacity:0.5;margin-top:10px">'+(p.isGuest?'👤 '+p.author:'선생님')+' · '+p.date+'</div>';
      html2 += '</div>';
    });
    html2 += '</div>';
  }
  body.innerHTML = html2;
}

function showEditForm() {
  var f = document.getElementById('edit-form');
  f.style.display = f.style.display==='none'?'block':'none';
}

function showPostForm(type) {
  var form = document.getElementById('post-form');
  var tf = document.getElementById('teacher-form');
  var gf = document.getElementById('guest-form');
  form.style.display = 'block';
  if (type==='teacher') { tf.style.display='block'; gf.style.display='none'; }
  else { tf.style.display='none'; gf.style.display='block'; }
}

function showCommentEditForm(id) {
  var view = document.getElementById('comment-view-'+id);
  var edit = document.getElementById('comment-edit-'+id);
  if (edit.style.display==='none') { view.style.display='none'; edit.style.display='block'; }
  else { view.style.display='block'; edit.style.display='none'; }
}

async function submitPost(type) {
  if (type==='teacher') {
    var pw = document.getElementById('p-pw').value;
    var title = document.getElementById('p-title').value;
    var content = document.getElementById('p-content').value;
    if (!title||!content) return alert('제목과 내용을 입력해주세요!');
    try {
      var res = await fetch(API,{method:'POST',body:JSON.stringify({action:'addPost',pw,title,content})});
      var data = await res.json();
      if (data.error) return alert(data.error);
      renderBoard();
    } catch(e) { alert('오류가 발생했어요.'); }
  } else {
    var author = document.getElementById('g-author').value;
    var gpw = document.getElementById('g-pw').value;
    var gtitle = document.getElementById('g-title').value;
    var gcontent = document.getElementById('g-content').value;
    if (!author||!gpw||!gtitle||!gcontent) return alert('모든 항목을 입력해주세요!');
    try {
      var res2 = await fetch(API,{method:'POST',body:JSON.stringify({action:'addGuestPost',author,pw:gpw,title:gtitle,content:gcontent})});
      var data2 = await res2.json();
      if (data2.error) return alert(data2.error);
      renderBoard();
    } catch(e) { alert('오류가 발생했어요.'); }
  }
}

async function submitEdit(id) {
  var pw = document.getElementById('e-pw').value;
  var title = document.getElementById('e-title').value;
  var content = document.getElementById('e-content').value;
  if (!title||!content) return alert('제목과 내용을 입력해주세요!');
  try {
    var res = await fetch(API,{method:'POST',body:JSON.stringify({action:'editPost',pw,id,title,content})});
    var data = await res.json();
    if (data.error) return alert(data.error);
    window._posts = (window._posts||[]).map(function(p) { return String(p.id)===String(id)?Object.assign({},p,{title,content}):p; });
    renderBoard(id);
  } catch(e) { alert('오류가 발생했어요.'); }
}

async function deletePostConfirm(id) {
  var pw = prompt('비밀번호를 입력하세요:');
  if (!pw) return;
  if (!confirm('정말 삭제할까요?')) return;
  try {
    var res = await fetch(API,{method:'POST',body:JSON.stringify({action:'deletePost',pw,id})});
    var data = await res.json();
    if (data.error) return alert(data.error);
    renderBoard();
  } catch(e) { alert('오류가 발생했어요.'); }
}

async function submitComment(post_id) {
  var author = document.getElementById('c-author').value;
  var pw = document.getElementById('c-pw').value;
  var content = document.getElementById('c-content').value;
  if (!author||!pw||!content) return alert('닉네임, 비밀번호, 댓글을 모두 입력해주세요!');
  try {
    await fetch(API,{method:'POST',body:JSON.stringify({action:'addComment',post_id,author,pw,content})});
    renderBoard(post_id);
  } catch(e) { alert('오류가 발생했어요.'); }
}

    if (data.error) return alert(data.error);
    renderBoard(post_id);
  } catch(e) { alert('오류가 발생했어요.'); }
}

function goPage(page) {
  currentPage = page;
  applyTheme();
  render();
}

function render() {
  var body = document.getElementById('body');
  if (currentPage==='home')          body.innerHTML = renderHome();
  else if (currentPage==='beginner') body.innerHTML = renderLessonList(BEGINNER,'초급 수어','📗');
  else if (currentPage==='vocab')    body.innerHTML = renderLessonList(VOCAB,'수어 어휘','📘');
  else if (currentPage==='advanced') body.innerHTML = renderAdvanced();
  else if (currentPage==='board')    renderBoard();
}

applyTheme();
render();
</script>
</body>
</html>
