async function loadCalendarData() {
  try {
    var res = await fetch(API + '?action=getCalendar');
    var rows = await res.json();
    calData = {};
    for (var i = 0; i < rows.length; i++) {
      var sentences = rows[i].sentences;
      if (typeof sentences === 'string') {
        try { sentences = JSON.parse(sentences); } catch(e) {}
      }
      calData[rows[i].date] = { word: rows[i].word, sentences: sentences };
    }
  } catch(e) {}
}

function th() { return THEMES[themeIdx]; }
function todayWord() { return WORD_DATA[new Date().getDate() % WORD_DATA.length].word; }
function todaySentences() { return WORD_DATA[new Date().getDate() % WORD_DATA.length].sentences; }

function linkify(text) {
  if (!text) return '';
  return text.replace(/(https?:\/\/[^\s<]+)/g, function(url) {
    return '<a href="' + url + '" target="_blank" rel="noopener noreferrer" style="color:#3b82f6;word-break:break-all">' + url + '</a>';
  });
}

function applyTheme() {
  var t = th();
  document.body.style.background = t.bg;
  document.body.style.color = t.text;
  document.getElementById('header').style.background = t.primary;
  var nav = document.getElementById('nav');
  nav.style.borderBottomColor = t.primary;
  nav.style.background = t.card;
  var btns = document.querySelectorAll('#nav button');
  var pages = ['beginner','vocab','advanced','today','board'];
  for (var i = 0; i < btns.length; i++) {
    btns[i].style.background = pages[i] === currentPage ? t.primary : t.card;
    btns[i].style.color = pages[i] === currentPage ? '#fff' : t.text;
  }
  document.getElementById('theme-sheet').style.background = t.card;
  document.getElementById('theme-sheet').style.color = t.text;
  buildThemeGrid();
}

function buildThemeGrid() {
  var grid = document.getElementById('theme-grid');
  grid.innerHTML = '';
  for (var i = 0; i < THEMES.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'theme-btn';
    btn.style.background = THEMES[i].primary;
    if (i === themeIdx) btn.style.boxShadow = '0 0 0 3px ' + THEMES[i].accent;
    btn.textContent = THEMES[i].name;
    btn.setAttribute('data-idx', i);
    btn.onclick = function() { themeIdx = parseInt(this.getAttribute('data-idx')); closeTheme(); applyTheme(); render(); };
    grid.appendChild(btn);
  }
}

function openTheme() { document.getElementById('theme-overlay').classList.add('open'); }
function closeTheme() { document.getElementById('theme-overlay').classList.remove('open'); }

function getYTId(url) {
  if (!url) return null;
  var m = url.match(/(?:youtu\.be\/|v=|embed\/)([^&?\/]+)/);

function renderCalendar() {
  var t = th();
  var now = new Date();
  var todayY = now.getFullYear();
  var todayM = now.getMonth();
  var todayD = now.getDate();
  var y = calYear;
  var m = calMonth;
  var monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var firstDay = new Date(y, m, 1).getDay();
  var lastDate = new Date(y, m+1, 0).getDate();

  var html = '<div style="font-weight:700;font-size:18px;margin-bottom:16px">📅 수어 달력</div>';
  html += '<div class="card">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  html += '<button onclick="calMove(-1)" style="background:none;border:none;font-size:24px;cursor:pointer;color:' + t.primary + ';font-weight:700">&lt;</button>';
  html += '<div style="font-weight:700;font-size:17px">' + y + '년 ' + monthNames[m] + '</div>';
  html += '<button onclick="calMove(1)" style="background:none;border:none;font-size:24px;cursor:pointer;color:' + t.primary + ';font-weight:700">&gt;</button>';
  html += '</div>';
  html += '<div class="cal-grid" style="margin-bottom:8px">';
  var dayNames = ['일','월','화','수','목','금','토'];
  var dayColors = ['#ef4444',t.text,t.text,t.text,t.text,t.text,'#3b82f6'];
  for (var di = 0; di < 7; di++) {
    html += '<div style="font-size:12px;font-weight:700;opacity:0.7;padding:4px;color:' + dayColors[di] + '">' + dayNames[di] + '</div>';
  }
  html += '</div><div class="cal-grid">';
  for (var bi = 0; bi < firstDay; bi++) html += '<div></div>';
  for (var d = 1; d <= lastDate; d++) {
    var dow = new Date(y, m, d).getDay();
    var isToday = (y === todayY && m === todayM && d === todayD);
    var dateStr = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var hasData = calData[dateStr] !== undefined;
    var tc = dow === 0 ? '#ef4444' : dow === 6 ? '#3b82f6' : t.text;
    var bg = isToday ? t.primary : 'transparent';
    var color = isToday ? '#fff' : (hasData ? tc : t.text + '33');
    var onclick = hasData ? 'onclick="calShowDay(\'' + dateStr + '\')"' : '';
    html += '<div ' + onclick + ' style="padding:6px 2px;border-radius:10px;cursor:' + (hasData ? 'pointer' : 'default') + ';background:' + bg + ';color:' + color + '">';
    html += '<div style="font-size:13px;font-weight:' + (isToday ? '700' : '500') + '">' + d + '</div>';
    html += '<div style="font-size:9px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (hasData ? calData[dateStr].word : '') + '</div>';
    html += '</div>';
  }
  html += '</div></div>';

  if (calSelected && calData[calSelected]) {
    var selData = calData[calSelected];
    var parts = calSelected.split('-');
    html += '<div class="card" style="border-left:4px solid ' + t.primary + '">';
    html += '<div style="font-weight:700;font-size:16px;margin-bottom:4px">' + parts[0] + '년 ' + parseInt(parts[1]) + '월 ' + parseInt(parts[2]) + '일</div>';
    html += '<div style="font-size:26px;font-weight:800;color:' + t.primary + ';margin:10px 0">"' + selData.word + '"</div>';
    html += '<div style="font-weight:700;font-size:14px;margin-bottom:8px">✏️ 수어 문장</div>';
    for (var si = 0; si < selData.sentences.length; si++) {
      html += '<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.06)">';
      html += '<span style="background:' + t.primary + ';color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">' + (si + 1) + '</span>';
      html += '<span style="font-size:14px;line-height:1.6">' + selData.sentences[si] + '</span></div>';
    }
    html += '</div>';
  }
  return html;
}

function calMove(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  calSelected = null;
  document.getElementById('body').innerHTML = renderCalendar();
}

function calShowDay(dateStr) {
  calSelected = dateStr;
  document.getElementById('body').innerHTML = renderCalendar();
}

    html += '<button onclick="deletePostConfirm(\'' + viewPostId + '\')" style="background:#ef4444;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-weight:600;cursor:pointer;font-size:13px">🗑️ 삭제</button>';
    html += '</div></div>';
    html += '<div id="edit-form" style="display:none;max-width:800px;margin:0 auto 16px"><div class="card">';
    html += '<div style="font-weight:700;margin-bottom:10px">✏️ 글 수정</div>';
    html += mkInp('e-pw','비밀번호','password');
    html += '<input id="e-title" class="inp" value="' + (post ? post.title.replace(/"/g,'&quot;') : '') + '" style="border:1.5px solid ' + t.primary + ';background:' + t.bg + ';color:' + t.text + '" />';
    html += '<textarea id="e-content" class="ta" style="border:1.5px solid ' + t.primary + ';background:' + t.bg + ';color:' + t.text + '">' + (post ? post.content : '') + '</textarea>';
    html += '<button class="submit-btn" style="background:' + t.primary + '" onclick="submitEdit(\'' + viewPostId + '\')">수정 완료</button>';
    html += '</div></div>';
    html += '<div class="card" style="max-width:800px;margin:0 auto 16px">';
    html += '<div style="font-weight:700;font-size:20px;margin-bottom:6px">' + (post ? post.title : '') + '</div>';
    html += '<div style="font-size:12px;opacity:0.6;margin-bottom:14px">' + (post && post.isGuest ? '👤 ' + post.author : '선생님') + ' · ' + (post ? post.date : '') + '</div>';
    html += '<div style="font-size:15px;line-height:1.8;white-space:pre-wrap">' + (post ? linkify(post.content) : '') + '</div>';
    html += '</div>';
    html += '<div style="max-width:800px;margin:0 auto">';
    html += '<div style="font-weight:700;font-size:16px;margin-bottom:12px">💬 댓글 ' + comments.length + '개</div>';
    for (var ci = 0; ci < comments.length; ci++) {
      var c = comments[ci];
      html += '<div class="card" style="padding:14px">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center">';
      html += '<div style="font-weight:600;font-size:13px">' + c.author + ' <span style="font-weight:400;opacity:0.6">· ' + c.date + '</span></div>';
      html += '<div style="display:flex;gap:6px">';
      html += '<button onclick="showCommentEditForm(\'' + c.id + '\')" style="background:none;border:none;cursor:pointer;font-size:13px;opacity:0.5">✏️</button>';
      html += '<button onclick="deleteCommentConfirm(\'' + c.id + '\',\'' + viewPostId + '\')" style="background:none;border:none;cursor:pointer;font-size:13px;opacity:0.5">🗑️</button>';
      html += '</div></div>';
      html += '<div id="cv-' + c.id + '" style="font-size:14px;margin-top:5px;white-space:pre-wrap">' + linkify(c.content) + '</div>';
      html += '<div id="ce-' + c.id + '" style="display:none;margin-top:8px">';
      html += mkInp('cepw-' + c.id,'비밀번호','password');
      html += '<textarea id="cect-' + c.id + '" class="ta" style="border:1.5px solid ' + t.primary + ';background:' + t.bg + ';color:' + t.text + ';min-height:60px">' + c.content + '</textarea>';
      html += '<button class="submit-btn" style="background:' + t.primary + ';font-size:13px;padding:8px 14px" onclick="submitCommentEdit(\'' + c.id + '\',\'' + viewPostId + '\')">수정 완료</button>';
      html += '</div></div>';
    }
    html += '<div class="card">';
    html += '<div style="font-weight:700;margin-bottom:10px">댓글 달기</div>';
    html += mkInp('c-author','닉네임');
    html += mkInp('c-pw','비밀번호 설정 (수정/삭제에 사용)','password');
    html += mkTa('c-content','댓글을 써봐요 😊');
    html += '<button class="submit-btn" style="background:' + t.primary + '" onclick="submitComment(\'' + viewPostId + '\')">댓글 올리기</button>';
    html += '</div></div>';
    body.innerHTML = html;
    return;
  }
  body.innerHTML = '<div style="text-align:center;padding:40px">⏳ 불러오는 중...</div>';
  var posts = [];
  try { var r = await fetch(API + '?action=getPosts'); posts = await r.json(); window._posts = posts; }
  catch(e) { body.innerHTML = '<div class="card" style="text-align:center;padding:30px;opacity:0.7">😥 게시판을 불러오지 못했어요.<br/>잠시 후 다시 시도해 주세요.</div>'; return; }
  var html2 = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">';
  html2 += '<span style="font-weight:700;font-size:18px">📋 게시판</span>';
  html2 += '<div style="display:flex;gap:8px">';
  html2 += '<button onclick="showPostForm(\'teacher\')" style="background:' + t.primary + ';color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px">✏️ 선생님</button>';
  html2 += '<button onclick="showPostForm(\'guest\')" style="background:#64748b;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px">✏️ 방문객</button>';
  html2 += '</div></div>';
  html2 += '<div id="post-form" style="display:none;max-width:600px;margin-bottom:16px">';
  html2 += '<div class="card" id="teacher-form" style="display:none"><div style="font-weight:700;margin-bottom:12px">🔒 선생님 글쓰기</div>';
  html2 += mkInp('p-pw','선생님 비밀번호','password') + mkInp('p-title','제목') + mkTa('p-content','내용을 입력해요');
  html2 += '<button class="submit-btn" style="background:' + t.primary + '" onclick="submitPost(\'teacher\')">올리기 📋</button></div>';
  html2 += '<div class="card" id="guest-form" style="display:none"><div style="font-weight:700;margin-bottom:12px">👤 방문객 글쓰기</div>';
  html2 += mkInp('g-author','닉네임') + mkInp('g-pw','비밀번호 설정 (수정/삭제에 사용)','password') + mkInp('g-title','제목') + mkTa('g-content','내용을 입력해요');
  html2 += '<button class="submit-btn" style="background:#64748b" onclick="submitPost(\'guest\')">올리기 📋</button></div></div>';
  if (posts.length === 0) {
    html2 += '<div class="card" style="text-align:center;padding:40px;opacity:0.7">아직 게시글이 없어요.<br/>첫 글을 써봐요! 😊</div>';
  } else {
    html2 += '<div class="board-grid">';
    for (var i = 0; i < posts.length; i++) {
      var p = posts[i];
      html2 += '<div class="board-item" onclick="renderBoard(\'' + p.id + '\')">';
      html2 += '<div style="font-weight:700;font-size:15px;margin-bottom:6px">' + p.title + '</div>';
      html2 += '<div style="font-size:13px;opacity:0.7">' + p.content.slice(0,80) + (p.content.length > 80 ? '...' : '') + '</div>';
      html2 += '<div style="font-size:12px;opacity:0.5;margin-top:10px">' + (p.isGuest ? '👤 ' + p.author : '선생님') + ' · ' + p.date + '</div>';
      html2 += '</div>';
    }
    html2 += '</div>';
  }
  body.innerHTML = html2;
}

function showEditForm() { var f = document.getElementById('edit-form'); f.style.display = f.style.display === 'none' ? 'block' : 'none'; }
function showPostForm(type) {
  document.getElementById('post-form').style.display = 'block';
  document.getElementById('teacher-form').style.display = type === 'teacher' ? 'block' : 'none';
  document.getElementById('guest-form').style.display = type === 'guest' ? 'block' : 'none';
}
function showCommentEditForm(id) {
  var cv = document.getElementById('cv-' + id);
  var ce = document.getElementById('ce-' + id);
  if (ce.style.display === 'none') { cv.style.display = 'none'; ce.style.display = 'block'; }
  else { cv.style.display = 'block'; ce.style.display = 'none'; }
}

async function submitPost(type) {
  try {
    var res;
    if (type === 'teacher') {
      var pw = document.getElementById('p-pw').value, title = document.getElementById('p-title').value, content = document.getElementById('p-content').value;
      if (!title || !content) return alert('제목과 내용을 입력해주세요!');
      res = await fetch(API, {method:'POST', body:JSON.stringify({action:'addPost', pw:pw, title:title, content:content})});
    } else {
      var author = document.getElementById('g-author').value, gpw = document.getElementById('g-pw').value, gtitle = document.getElementById('g-title').value, gcontent = document.getElementById('g-content').value;
      if (!author || !gpw || !gtitle || !gcontent) return alert('모든 항목을 입력해주세요!');
      res = await fetch(API, {method:'POST', body:JSON.stringify({action:'addGuestPost', author:author, pw:gpw, title:gtitle, content:gcontent})});
    }
    var data = await res.json();
    if (data.error) return alert(data.error);
    renderBoard();
  } catch(e) { alert('오류가 발생했어요.'); }
}

async function submitEdit(id) {
  try {
    var pw = document.getElementById('e-pw').value, title = document.getElementById('e-title').value, content = document.getElementById('e-content').value;
    if (!title || !content) return alert('제목과 내용을 입력해주세요!');
    var res = await fetch(API, {method:'POST', body:JSON.stringify({action:'editPost', pw:pw, id:id, title:title, content:content})});
    var data = await res.json();
    if (data.error) return alert(data.error);
    renderBoard(id);
  } catch(e) { alert('오류가 발생했어요.'); }
}

async function deletePostConfirm(id) {
  var pw = prompt('비밀번호를 입력하세요:');
  if (!pw) return;
  if (!confirm('정말 삭제할까요?')) return;
  try {
    var res = await fetch(API, {method:'POST', body:JSON.stringify({action:'deletePost', pw:pw, id:id})});
    var data = await res.json();
    if (data.error) return alert(data.error);
    renderBoard();
  } catch(e) { alert('오류가 발생했어요.'); }
}

async function submitComment(post_id) {
  try {
    var author = document.getElementById('c-author').value, pw = document.getElementById('c-pw').value, content = document.getElementById('c-content').value;
    if (!author || !pw || !content) return alert('닉네임, 비밀번호, 댓글을 모두 입력해주세요!');
    await fetch(API, {method:'POST', body:JSON.stringify({action:'addComment', post_id:post_id, author:author, pw:pw, content:content})});
    renderBoard(post_id);
  } catch(e) { alert('오류가 발생했어요.'); }
}

async function submitCommentEdit(id, post_id) {
  try {
    var pw = document.getElementById('cepw-' + id).value, content = document.getElementById('cect-' + id).value;
    if (!content) return alert('내용을 입력해주세요!');
    var res = await fetch(API, {method:'POST', body:JSON.stringify({action:'editComment', id:id, pw:pw, content:content})});
    var data = await res.json();
    if (data.error) return alert(data.error);
    renderBoard(post_id);
  } catch(e) { alert('오류가 발생했어요.'); }
}

async function deleteCommentConfirm(id, post_id) {
  var pw = prompt('비밀번호를 입력하세요:');
  if (!pw) return;
  if (!confirm('댓글을 삭제할까요?')) return;
  try {
    var res = await fetch(API, {method:'POST', body:JSON.stringify({action:'deleteComment', pw:pw, id:id})});
    var data = await res.json();
    if (data.error) return alert(data.error);
    renderBoard(post_id);
  } catch(e) { alert('오류가 발생했어요.'); }
}

function goPage(page) { currentPage = page; applyTheme(); render(); }

function render() {
  var body = document.getElementById('body');
  if (currentPage === 'home')          body.innerHTML = renderHome();
  else if (currentPage === 'beginner') body.innerHTML = renderLessonList(BEGINNER,'초급 수어','📗');
  else if (currentPage === 'vocab')    body.innerHTML = renderLessonList(VOCAB,'수어 어휘','📘');
  else if (currentPage === 'advanced') body.innerHTML = renderAdvanced();
  else if (currentPage === 'today')    showToday();
  else if (currentPage === 'board')    renderBoard();
}

applyTheme();
render();
</script>
