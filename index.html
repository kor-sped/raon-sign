let themeIdx = 0;
let currentPage = 'home';

function t() { return THEMES[themeIdx]; }

function todayWord() { return WORD_DATA[new Date().getDate() % WORD_DATA.length].word; }
function todaySentences() { return WORD_DATA[new Date().getDate() % WORD_DATA.length].sentences; }

function applyTheme() {
  const th = t();
  document.body.style.background = th.bg;
  document.body.style.color = th.text;
  document.getElementById('header').style.background = th.primary;
  const nav = document.getElementById('nav');
  nav.style.borderBottomColor = th.primary;
  nav.style.background = th.card;
  document.querySelectorAll('#nav button').forEach((b, i) => {
    const pages = ['beginner','vocab','advanced','board'];
    b.style.background = pages[i] === currentPage ? th.primary : th.card;
    b.style.color = pages[i] === currentPage ? '#fff' : th.text;
  });
  const sheet = document.getElementById('theme-sheet');
  sheet.style.background = th.card;
  sheet.style.color = th.text;
  buildThemeGrid();
}

function buildThemeGrid() {
  const grid = document.getElementById('theme-grid');
  grid.innerHTML = '';
  THEMES.forEach((th, i) => {
    const btn = document.createElement('button');
    btn.className = 'theme-btn';
    btn.style.background = th.primary;
    if (i === themeIdx) btn.style.boxShadow = '0 0 0 3px ' + th.accent;
    btn.textContent = th.name;
    btn.onclick = () => { themeIdx = i; closeTheme(); applyTheme(); render(); };
    grid.appendChild(btn);
  });
}

function openTheme() { document.getElementById('theme-overlay').classList.add('open'); }
function closeTheme() { document.getElementById('theme-overlay').classList.remove('open'); }

function getYTId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([^&?/]+)/);
  return m ? m[1] : null;
}

function linkify(text) {
  if (!text) return '';
  return text.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#3b82f6;word-break:break-all">${url}</a>`);
}

  return `<input id="${id}" type="${type}" class="inp" placeholder="${placeholder}" style="border:1.5px solid ${th.primary};background:${th.bg};color:${th.text}" />`;
}

async function deleteCommentConfirm(id, post_id) {
  const pw = prompt('비밀번호를 입력하세요:');
  if (!pw) return;
  if (!confirm('댓글을 삭제할까요?')) return;
  try {
    const res = await fetch(API,{method:'POST',body:JSON.stringify({action:'deleteComment',pw,id})});
    const data = await res.json();
    if (data.error) return alert(data.error);
    renderBoard(post_id);
  } catch(e) { alert('오류가 발생했어요. 다시 시도해주세요.'); }
}

function showEditForm() {
  const f = document.getElementById('edit-form');
  f.style.display = f.style.display==='none'?'block':'none';
}

async function submitEdit(id) {
  const pw = document.getElementById('e-pw').value;
  const title = document.getElementById('e-title').value;
  const content = document.getElementById('e-content').value;
  if (!title||!content) return alert('제목과 내용을 입력해주세요!');
  try {
    const res = await fetch(API,{method:'POST',body:JSON.stringify({action:'editPost',pw,id,title,content})});
    const data = await res.json();
    if (data.error) return alert(data.error);
    window._posts = window._posts.map(p=>String(p.id)===String(id)?{...p,title,content}:p);
    renderBoard(id);
  } catch(e) { alert('오류가 발생했어요. 다시 시도해주세요.'); }
}

async function deletePostConfirm(id) {
  const pw = prompt('비밀번호를 입력하세요:');
  if (!pw) return;
  if (!confirm('정말 삭제할까요?')) return;
  try {
    const res = await fetch(API,{method:'POST',body:JSON.stringify({action:'deletePost',pw,id})});
    const data = await res.json();
    if (data.error) return alert(data.error);
    renderBoard();
  } catch(e) { alert('오류가 발생했어요. 다시 시도해주세요.'); }
}

function showPostForm(type) {
  const form = document.getElementById('post-form');
  const tf = document.getElementById('teacher-form');
  const gf = document.getElementById('guest-form');
  if (type === 'teacher') {
    form.style.display = 'block';
    tf.style.display = 'block';
    gf.style.display = 'none';
  } else {
    form.style.display = 'block';
    tf.style.display = 'none';
    gf.style.display = 'block';
  }
}

async function submitPost(type) {
  if (type === 'teacher') {
    const pw = document.getElementById('p-pw').value;
    const title = document.getElementById('p-title').value;
    const content = document.getElementById('p-content').value;
    if (!title||!content) return alert('제목과 내용을 입력해주세요!');
    try {
      const res = await fetch(API,{method:'POST',body:JSON.stringify({action:'addPost',pw,title,content})});
      const data = await res.json();
      if (data.error) return alert(data.error);
      renderBoard();
    } catch(e) { alert('오류가 발생했어요. 다시 시도해주세요.'); }
  } else {
    const author = document.getElementById('g-author').value;
    const pw = document.getElementById('g-pw').value;
    const title = document.getElementById('g-title').value;
    const content = document.getElementById('g-content').value;
    if (!author||!pw||!title||!content) return alert('모든 항목을 입력해주세요!');
    try {
      const res = await fetch(API,{method:'POST',body:JSON.stringify({action:'addGuestPost',author,pw,title,content})});
      const data = await res.json();
      if (data.error) return alert(data.error);
      renderBoard();
    } catch(e) { alert('오류가 발생했어요. 다시 시도해주세요.'); }
  }
}

function showCommentEditForm(id) {
  const view = document.getElementById('comment-view-'+id);
  const edit = document.getElementById('comment-edit-'+id);
  if (edit.style.display === 'none') {
    view.style.display = 'none';

  } else {
    view.style.display = 'block';
    edit.style.display = 'none';
  }
}

async function submitCommentEdit(id, post_id) {
  const pw = document.getElementById('ce-pw-'+id).value;

}

async function submitComment(post_id) {
  const author = document.getElementById('c-author').value;

  const content = document.getElementById('c-content').value;
  if (!author||!pw||!content) return alert('닉네임, 비밀번호, 댓글을 모두 입력해주세요!');
  try {
    await fetch(API,{method:'POST',body:JSON.stringify({action:'addComment',post_id,author,pw,content})});
    renderBoard(post_id);
  } catch(e) { alert('오류가 발생했어요. 다시 시도해주세요.'); }
}

  render();
}

function render() {
  const body = document.getElementById('body');
  if (currentPage==='home')          body.innerHTML = renderHome();
  else if (currentPage==='beginner') body.innerHTML = renderLessonList(BEGINNER,'초급 수어','📗');
  else if (currentPage==='vocab')    body.innerHTML = renderLessonList(VOCAB,'수어 어휘','📘');
  else if (currentPage==='advanced') body.innerHTML = renderAdvanced();
  else if (currentPage==='board')    renderBoard();
}

applyTheme();
render();
</script>
</body>
</html>
